# Database sources (env expanded by Toolbox from docker-compose).
kind: source
name: olympics-postgres
type: postgres
host: ${POSTGRES_HOST}
port: ${POSTGRES_PORT}
database: ${POSTGRES_DB}
user: ${POSTGRES_USER}
password: ${POSTGRES_PASSWORD}
---
kind: source
name: olympics-mongo
type: mongodb
uri: ${MONGO_URI}
