# MongoDB in Docker — tutorial defaults.
# ``quiet`` trims routine lines; FTDC periodic collection is off.
# Compose healthcheck uses a TCP probe (not ``mongosh``) so logs are not flooded
# with client-metadata / ACCESS / NETWORK lines every few seconds.
systemLog:
  quiet: true

storage:
  dbPath: /data/db
net:
  bindIpAll: true
  port: 27017

setParameter:
  diagnosticDataCollectionEnabled: false
