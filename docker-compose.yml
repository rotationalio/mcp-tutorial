# Local Olympic data stack for the tutorial: two databases, one data loader, one MCP Toolbox server.
# From the repo root: `docker compose up --build`
# Services talk to each other by *service name* (postgres, mongo, seed, toolbox) on Docker’s internal network.

services:
  # Classic relational database: countries, games, athletes, results (see db/postgres/).
  postgres:
    image: postgres:16-alpine
    # Server log: ERROR and above only (plus ``log_connections`` off so clients are quiet).
    command:
      - "postgres"
      - "-c"
      - "log_min_messages=error"
      - "-c"
      - "log_connections=off"
      - "-c"
      - "log_disconnections=off"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olympics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olympics}
      POSTGRES_DB: ${POSTGRES_DB:-olympics}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "${POSTGRES_USER:-olympics}" -d "${POSTGRES_DB:-olympics}"',
        ]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

  # Document-style store: athlete bios and wide event rows (see db/mongo/).
  mongo:
    image: mongo:7
    # See ``docker/mongo/mongod.conf`` (``quiet``, no FTDC).
    command: ["mongod", "--config", "/etc/mongo/mongod.conf"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./db/mongo:/docker-entrypoint-initdb.d:ro
      - ./docker/mongo/mongod.conf:/etc/mongo/mongod.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/27017' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Runs once per `compose up`: downloads CSVs, fills Postgres + Mongo, then exits.
  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.seed
    volumes:
      - ./data/cache:/app/data/cache
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-olympics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olympics}
      POSTGRES_DB: ${POSTGRES_DB:-olympics}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-olympics}
      HF_DATASET_REPO: ${HF_DATASET_REPO:-SVeldman/126-years-olympic-results}
      HF_DATASET_REVISION: ${HF_DATASET_REVISION:-main}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: "no"

  # Google MCP Toolbox: reads YAML from toolbox/config/tools/, connects to Postgres + Mongo,
  # exposes a small web UI, an MCP URL, and an HTTP API for Python (toolbox-core).
  toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:1.1.0
    # Image is amd64-only; on ARM hosts (Apple Silicon) this selects emulation instead of failing the pull.
    platform: linux/amd64
    # If the container exits (e.g. DB not ready yet), Compose will start it again.
    restart: on-failure
    ports:
      # Host port 5050 → Toolbox’s port 5000 inside the container. Match TOOLBOX_BASE_URL in .env.
      - "5050:5000"
    volumes:
      - ./toolbox/config:/config:ro
    command:
      # Merge every .yaml in this folder into one config (order: file names 01_, 02_, …).
      - "--config-folder"
      - "/config/tools"
      # Listen on all interfaces so port publishing from the host works.
      - "--address"
      - "0.0.0.0"
      # Built-in web UI to try tools by hand (see README).
      - "--ui"
      # Toolbox server logs at INFO (default CLI level; still quieter than DEBUG).
      - "--log-level"
      - "INFO"
      # Tutorial-only: allow any browser origin/host. Tighten for a real deployment.
      - "--allowed-hosts"
      - "*"
      - "--allowed-origins"
      - "*"
    environment:
      # Toolbox runs *inside* Docker, so the database hostname is the service name, not localhost.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-olympics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olympics}
      POSTGRES_DB: ${POSTGRES_DB:-olympics}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-olympics}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
